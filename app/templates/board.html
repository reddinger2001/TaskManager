{% extends "base.html" %}
{% block title %}Board — TaskManager{% endblock %}

{% block content %}
<div x-data="board()">

<!-- Header -->
<div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-bold mono tracking-wider text-text">BOARD</h2>
    <div class="flex items-center gap-2">
        <select x-model="filterProject" @change="applyFilters()"
                class="px-3 py-1.5 text-xs mono bg-surface border border-border rounded text-text focus:outline-none focus:border-accent/40">
            <option value="">All Projects</option>
            {% for p in projects %}
            <option value="{{ p.id }}"{% if project_id == p.id|string %} selected{% endif %}>{{ p.name }}</option>
            {% endfor %}
        </select>
        <select x-model="filterAssignee" @change="applyFilters()"
                class="px-3 py-1.5 text-xs mono bg-surface border border-border rounded text-text focus:outline-none focus:border-accent/40">
            <option value="">All Assignees</option>
            {% for a in assignees %}
            <option value="{{ a }}"{% if assignee == a %} selected{% endif %}>{{ a }}</option>
            {% endfor %}
        </select>
    </div>
</div>

<!-- Board -->
<div class="flex gap-3 overflow-x-auto pb-4" style="min-width: 1100px; min-height: calc(100vh - 12rem);">

    <template x-for="status in statuses" :key="status.key">
        <div class="flex-shrink-0 w-72 flex flex-col rounded-xl overflow-hidden border border-border/60 column-bg"
             @dragover.prevent="dropTarget = status.key"
             @dragleave="dropTarget = null"
             @drop="onDrop($event, status.key)">

            <!-- Column Header -->
            <div class="flex items-center justify-between px-4 py-3 border-b border-border/60">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full" :style="'background: ' + status.color + '; box-shadow: 0 0 8px ' + status.color + '60;'"></span>
                    <h2 class="text-xs font-semibold mono uppercase tracking-widest" :style="'color: ' + status.color" x-text="status.label"></h2>
                </div>
                <span class="mono text-xs px-1.5 py-0.5 rounded bg-panel border border-border" x-text="filteredTasks(status.key).length"></span>
            </div>

            <!-- Cards -->
            <div class="flex-1 overflow-y-auto p-3 space-y-2">
                <template x-for="task in filteredTasks(status.key)" :key="task.id">
                    <div class="bg-surface border border-border rounded-lg p-3 cursor-grab active:cursor-grabbing hover:border-accent/30 hover:shadow-lg hover:shadow-accent/5 transition-all group"
                         draggable="true"
                         @dragstart="onDragStart($event, task)"
                         @dragend="onDragEnd($event)"
                         @click="$data.preview(task)">

                        <!-- Priority + Title -->
                        <div class="flex items-start justify-between gap-2">
                            <div class="flex items-center gap-1.5 min-w-0">
                                <span x-show="task.priority" class="mono text-xs font-bold px-1.5 py-0.5 rounded shrink-0" :class="priorityClass(task.priority)" x-text="task.priority"></span>
                                <h3 class="text-sm font-medium text-text truncate" x-text="task.title"></h3>
                            </div>
                            <!-- Open full detail link -->
                            <a :href="'/tasks/' + task.id"
                               class="shrink-0 opacity-0 group-hover:opacity-100 transition-opacity text-muted hover:text-accent p-0.5"
                               @click.stop>
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            </a>
                        </div>

                        <!-- Description -->
                        <p x-show="task.description" class="text-xs text-muted mt-1.5 line-clamp-2 leading-relaxed" x-text="task.description"></p>

                        <!-- Footer -->
                        <div class="flex items-center justify-between mt-2.5">
                            <div class="flex items-center gap-2">
                                <span x-show="task.assignee" class="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold mono border shrink-0" :style="'background: ' + stringToColor(task.assignee) + '15; color: ' + stringToColor(task.assignee) + '; border-color: ' + stringToColor(task.assignee) + '30;'" x-text="task.assignee.charAt(0).toUpperCase()"></span>
                                <span x-show="task.project" class="text-xs text-muted truncate max-w-[7rem]" x-text="task.project"></span>
                            </div>
                            <span x-show="task.due_date" class="text-xs mono" :class="isOverdue(task.due_date) ? 'text-red-400' : 'text-muted'" x-text="formatDate(task.due_date)"></span>
                        </div>

                        <!-- Tags -->
                        <div x-show="task.tags && task.tags.length > 0" class="flex flex-wrap gap-1 mt-2">
                            <template x-for="tag in task.tags" :key="tag">
                                <span class="mono text-xs px-1.5 py-0.5 rounded bg-panel text-muted border border-border" x-text="'#' + tag"></span>
                            </template>
                        </div>
                    </div>
                </template>

                <div x-show="filteredTasks(status.key).length === 0" class="text-center py-8">
                    <span class="text-xs mono text-muted/50">— empty —</span>
                </div>
            </div>
        </div>
    </template>

</div>

<!-- Quick Preview Modal -->
<div x-show="showPreview" x-cloak
     class="fixed inset-0 z-50 flex items-start justify-center pt-20"
     @click.self="showPreview = false"
     @keydown.escape.window="showPreview = false"
     x-transition:enter="transition ease-out duration-150"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-100"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0">

    <!-- Backdrop -->
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm"></div>

    <!-- Modal -->
    <div class="relative w-full max-w-lg bg-surface border border-border rounded-xl shadow-2xl glow-accent overflow-hidden"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-4 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 -translate-y-4 scale-95">

        <!-- Modal Header -->
        <div class="flex items-center justify-between px-5 py-3 border-b border-border">
            <div class="flex items-center gap-2 min-w-0">
                <span x-show="previewTask.priority" class="mono text-xs font-bold px-1.5 py-0.5 rounded shrink-0" :class="priorityClass(previewTask.priority)" x-text="previewTask.priority"></span>
                <h3 class="text-sm font-semibold text-text truncate" x-text="previewTask.title"></h3>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <span class="mono text-xs px-2 py-0.5 rounded capitalize" :class="statusBadgeClass(previewTask.status)" x-text="previewTask.status"></span>
                <button @click="showPreview = false" class="text-muted hover:text-text transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>

        <!-- Modal Body -->
        <div class="px-5 py-4 space-y-3">
            <p x-show="previewTask.description" class="text-sm text-text leading-relaxed" x-text="previewTask.description"></p>

            <div class="flex items-center gap-4 text-xs mono">
                <span x-show="previewTask.project" class="text-muted">
                    <svg class="w-3.5 h-3.5 inline mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                    <span x-text="previewTask.project"></span>
                </span>
                <span x-show="previewTask.assignee" class="text-muted">
                    <svg class="w-3.5 h-3.5 inline mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span x-text="previewTask.assignee"></span>
                </span>
                <span x-show="previewTask.due_date" class="mono" :class="isOverdue(previewTask.due_date) ? 'text-red-400' : 'text-muted'">
                    <svg class="w-3.5 h-3.5 inline mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span x-text="formatDate(previewTask.due_date)"></span>
                </span>
            </div>

            <!-- Tags -->
            <div x-show="previewTask.tags && previewTask.tags.length > 0" class="flex flex-wrap gap-1.5">
                <template x-for="tag in previewTask.tags" :key="tag">
                    <span class="mono text-xs px-2 py-0.5 rounded bg-panel text-muted border border-border" x-text="'#' + tag"></span>
                </template>
            </div>

            <!-- Quick status change -->
            <div class="pt-2 border-t border-border">
                <label class="text-xs mono text-muted uppercase tracking-wider mb-1.5 block">Quick Status</label>
                <div class="flex gap-1.5 flex-wrap">
                    <template x-for="st in statuses" :key="st.key">
                        <button @click="changeStatus(previewTask, st.key)"
                                class="mono text-xs px-2.5 py-1 rounded border transition-all"
                                :class="previewTask.status === st.key ? 'border-accent/40 bg-accent/10 text-accent' : 'border-border text-muted hover:border-border/80'"
                                x-text="st.label"></button>
                    </template>
                </div>
            </div>
        </div>

        <!-- Modal Footer -->
        <div class="px-5 py-3 border-t border-border flex items-center justify-between">
            <a :href="'/tasks/' + previewTask.id"
               class="text-xs mono text-accent hover:text-cyan-300 transition-colors inline-flex items-center gap-1">
                Open full detail
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            </a>
        </div>
    </div>
</div>

</div><!-- end x-data -->
{% endblock %}

{% block extra_scripts %}
<script>
function board() {
    return {
        filterProject: '{{ project_id }}',
        filterAssignee: '{{ assignee }}',
        draggedTask: null,
        dropTarget: null,
        wasDragged: false,
        showPreview: false,
        previewTask: {},

        statuses: [
            { key: 'backlog',   label: 'Backlog',   color: '#6b7280' },
            { key: 'active',    label: 'Active',     color: '#00e5ff' },
            { key: 'delegated', label: 'Delegated',  color: '#7c4dff' },
            { key: 'blocked',   label: 'Blocked',    color: '#ff5252' },
            { key: 'done',      label: 'Done',       color: '#69f0ae' },
        ],

        tasks: {{ task_data | tojson }},

        filteredTasks(status) {
            let tasks = this.tasks.filter(t => t.status === status);
            if (this.filterProject) {
                tasks = tasks.filter(t => t.project_id == this.filterProject);
            }
            if (this.filterAssignee) {
                tasks = tasks.filter(t => t.assignee === this.filterAssignee);
            }
            return tasks;
        },

        applyFilters() {
            // Filters are reactive via Alpine — no action needed
        },

        preview(task) {
            if (this.wasDragged) { this.wasDragged = false; return; }
            this.previewTask = task;
            this.showPreview = true;
        },

        changeStatus(task, newStatus) {
            fetch('/tasks/' + task.id, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            }).then(r => r.json()).then(data => {
                if (data.ok) {
                    task.status = newStatus;
                    this.previewTask = task;
                } else {
                    alert('Failed to update task: ' + (data.error || 'unknown error'));
                }
            }).catch(err => {
                alert('Network error updating task');
                console.error(err);
            });
        },

        onDragStart(event, task) {
            this.draggedTask = task;
            this.wasDragged = true;
            event.target.classList.add('opacity-40', 'scale-95');
            if (event.dataTransfer) event.dataTransfer.effectAllowed = 'move';
        },
        onDragEnd(event) {
            event.target.classList.remove('opacity-40', 'scale-95');
            this.draggedTask = null;
        },
        onDrop(event, statusKey) {
            event.preventDefault();
            const task = this.draggedTask;
            if (task && task.status !== statusKey) {
                fetch('/tasks/' + task.id, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: statusKey })
                }).then(r => r.json()).then(data => {
                    if (data.ok) {
                        task.status = statusKey;
                    } else {
                        alert('Failed to update task: ' + (data.error || 'unknown error'));
                    }
                }).catch(err => {
                    alert('Network error updating task');
                    console.error(err);
                });
            }
            this.dropTarget = null;
        },

        priorityClass(p) {
            if (p === 'P0') return 'bg-red-500/20 text-red-400 border border-red-500/30';
            if (p === 'P1') return 'bg-amber-500/20 text-amber-400 border border-amber-500/30';
            if (p === 'P2') return 'bg-cyan-500/20 text-accent border border-cyan-500/30';
            return '';
        },

        statusBadgeClass(status) {
            const map = {
                'backlog':   'text-muted bg-panel',
                'active':    'text-accent bg-accent/10',
                'delegated': 'text-accent2 bg-accent2/10',
                'blocked':   'text-red-400 bg-red-500/10',
                'done':      'text-emerald-400 bg-emerald-500/10',
            };
            return map[status] || 'text-muted bg-panel';
        },

        formatDate(d) {
            if (!d) return '';
            const date = new Date(d);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        },

        isOverdue(d) {
            if (!d) return false;
            const today = new Date(); today.setHours(0,0,0,0);
            return new Date(d) < today;
        },

        stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            const colors = ['#00e5ff', '#7c4dff', '#ff5252', '#ffc107', '#69f0ae', '#ff6e40'];
            return colors[Math.abs(hash) % colors.length];
        }
    }
}
</script>
{% endblock %}
