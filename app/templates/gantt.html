{% extends "base.html" %}
{% block title %}Gantt — TaskManager{% endblock %}

{% block extra_head %}
<style>
@media print {
    .no-print, nav, .fixed, [x-cloak] { display: none !important; }
    body { background: white !important; color: #1a2332 !important; }
    .bg-panel { background: white !important; border-color: #ddd !important; }
    .text-text { color: #1a2332 !important; }
    .text-muted { color: #666 !important; }
    .border-border { border-color: #ddd !important; }
    h2 { color: #0a0e17 !important; }
    .fc-event { border: 1px solid #333 !important; }
}
</style>
{% endblock %}

{% block content %}
<div x-data="gantt()">

<!-- Header -->
<div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-bold mono tracking-wider text-text">GANTT</h2>
    <div class="flex items-center gap-2">
        <select x-model="filterProject" @change="applyFilters()"
                class="px-3 py-1.5 text-xs mono bg-surface border border-border rounded text-text focus:outline-none focus:border-accent/40 no-print">
            <option value="">All Projects</option>
            {% for p in projects %}
            <option value="{{ p.id }}"{% if project_id == p.id|string %} selected{% endif %}>{{ p.name }}</option>
            {% endfor %}
        </select>
        <button onclick="window.print()"
                class="px-3 py-1.5 text-xs font-medium mono uppercase tracking-wider text-muted border border-border rounded hover:text-text transition-colors no-print">
            Export PDF
        </button>
    </div>
</div>

<!-- Gantt Chart -->
<div class="bg-panel border border-border rounded-xl overflow-hidden" x-show="tasks.length > 0">

    <!-- Single scrollable container -->
    <div class="overflow-x-auto" id="timeline-scroll">
        <div :style="'width: ' + (280 + timelineWidth) + 'px;'">

            <!-- Timeline Header Row -->
            <div class="flex border-b border-border">
                <!-- Task labels column header -->
                <div class="w-[280px] flex-shrink-0 sticky left-0 z-10 px-4 py-2.5 border-r border-border bg-panel">
                    <span class="text-xs mono uppercase tracking-widest text-muted">Task</span>
                </div>
                <!-- Date headers -->
                <div class="flex relative" :style="'width: ' + timelineWidth + 'px'">
                    <template x-for="day in days" :key="day.key">
                        <div class="flex-shrink-0 text-center border-r border-border/30"
                             :style="'width: ' + dayWidth + 'px'"
                             :class="day.isToday ? 'bg-accent/5' : ''">
                            <div class="py-1">
                                <span class="text-[9px] mono text-muted" x-text="day.month"></span>
                                <span class="text-[10px] mono font-bold" :class="day.isToday ? 'text-accent' : 'text-muted'" x-text="day.dayNum"></span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Task Rows -->
            <div class="max-h-[600px] overflow-y-auto">
                <template x-for="task in tasks" :key="task.id">
                    <div class="flex border-b border-border/30 hover:bg-surface/50 transition-colors group">
                        <!-- Task label (sticky left) -->
                        <a :href="'/tasks/' + task.id"
                           class="w-[280px] flex-shrink-0 sticky left-0 z-10 px-4 py-2.5 border-r border-border bg-panel flex items-center gap-2 no-underline">
                            <span class="w-2 h-2 rounded-full flex-shrink-0" :style="'background: ' + statusColor(task.status)"></span>
                            <span class="text-xs font-medium text-text truncate" x-text="task.title"></span>
                        </a>
                        <!-- Timeline bar -->
                        <div class="flex-1 relative py-2">
                            <svg :style="'width: ' + timelineWidth + 'px; height: 36px;'">
                                <!-- Today line -->
                                <line x-bind:x1="todayX" y1="0" x-bind:x2="todayX" y2="36" stroke="#00e5ff40" stroke-width="1" stroke-dasharray="3,3"/>
                                <!-- Task bar -->
                                <rect x-bind:x="taskBarX(task)" y="8" x-bind:width="taskBarWidth(task)" height="20" rx="4"
                                      x-bind:fill="statusColor(task.status) + '30'"
                                      x-bind:stroke="statusColor(task.status)"
                                      stroke-width="1.5"
                                      class="cursor-pointer transition-all"
                                      @click="$event.preventDefault(); window.location.href = '/tasks/' + task.id">
                                </rect>
                                <!-- Task label on bar -->
                                <text x-bind:x="taskBarX(task) + taskBarWidth(task) / 2" y="22" text-anchor="middle"
                                      class="fill-text text-[9px] mono pointer-events-none"
                                      x-text="task.start_date + ' → ' + task.due_date"></text>
                                <!-- Recurrence indicator -->
                                <text x-bind:x="taskBarX(task) + taskBarWidth(task) - 2" y="14" text-anchor="end"
                                      class="fill-accent text-[10px] pointer-events-none"
                                      :opacity="task.recurrence ? 1 : 0">
                                    ↻
                                </text>
                            </svg>
                        </div>
                    </div>
                </template>
            </div>

        </div>
    </div>
</div>

<!-- Empty state -->
<div x-show="tasks.length === 0" class="flex flex-col items-center justify-center py-20 bg-panel border border-border rounded-xl">
    <svg class="w-10 h-10 text-muted mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
    <p class="text-sm mono text-muted">No tasks with due dates</p>
</div>

<!-- Legend -->
<div class="flex items-center gap-4 mt-4 px-2">
    <span class="text-[10px] mono text-muted uppercase tracking-wider">Status:</span>
    <template x-for="s in statuses" :key="s.key">
        <span class="flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full" :style="'background: ' + s.color"></span>
            <span class="text-[10px] mono text-muted capitalize" x-text="s.key"></span>
        </span>
    </template>
</div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
function gantt() {
    return {
        filterProject: '{{ project_id }}',
        dayWidth: 36,

        rawTasks: {{ task_data | tojson }},

        get tasks() {
            let tasks = this.rawTasks;
            if (this.filterProject) {
                tasks = tasks.filter(t => t.project_id == this.filterProject);
            }
            return tasks.sort((a, b) => a.due_date.localeCompare(b.due_date));
        },

        get startDate() {
            if (this.tasks.length === 0) return new Date();
            const min = new Date(this.tasks.reduce((min, t) => t.due_date < min ? t.due_date : min, this.tasks[0].due_date));
            // Start from beginning of week
            min.setDate(min.getDate() - min.getDay());
            return min;
        },

        get endDate() {
            if (this.tasks.length === 0) return new Date();
            const max = new Date(this.tasks.reduce((max, t) => t.due_date > max ? t.due_date : max, this.tasks[0].due_date));
            // End at end of week
            max.setDate(max.getDate() + (6 - max.getDay()));
            return max;
        },

        get days() {
            const days = [];
            const start = new Date(this.startDate);
            const today = new Date(); today.setHours(0, 0, 0, 0);
            for (let d = new Date(start); d <= this.endDate; d.setDate(d.getDate() + 1)) {
                const isToday = d.toDateString() === today.toDateString();
                days.push({
                    key: d.toISOString(),
                    month: d.toLocaleDateString('en-US', { month: 'short' }),
                    dayNum: d.getDate(),
                    isToday,
                });
            }
            return days;
        },

        get timelineWidth() {
            return this.days.length * this.dayWidth;
        },

        get todayX() {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const start = new Date(this.startDate);
            const diffDays = Math.round((today - start) / (1000 * 60 * 60 * 24));
            return diffDays * this.dayWidth + this.dayWidth / 2;
        },

        taskBarX(task) {
            const due = new Date(task.due_date);
            const start = new Date(this.startDate);
            const diffDays = Math.round((due - start) / (1000 * 60 * 60 * 24));
            return diffDays * this.dayWidth + 2;
        },

        taskBarWidth(task) {
            const start = new Date(task.start_date || task.due_date);
            const end = new Date(task.due_date);
            let days = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
            return Math.max(days * this.dayWidth - 4, 16);
        },

        statusColor(status) {
            const map = {
                'backlog': '#6b7280',
                'active': '#00e5ff',
                'delegated': '#7c4dff',
                'blocked': '#ff5252',
                'done': '#69f0ae',
            };
            return map[status] || '#6b7280';
        },

        statuses: [
            { key: 'backlog', color: '#6b7280' },
            { key: 'active', color: '#00e5ff' },
            { key: 'delegated', color: '#7c4dff' },
            { key: 'blocked', color: '#ff5252' },
            { key: 'done', color: '#69f0ae' },
        ],

        applyFilters() {}
    };
}
</script>
{% endblock %}
