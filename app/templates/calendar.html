{% extends "base.html" %}
{% block title %}Calendar — TaskManager{% endblock %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
<style>
    .fc { font-family: 'Inter', system-ui, sans-serif; }
    .fc .fc-toolbar-title { font-family: 'JetBrains Mono', Consolas, monospace; font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; color: #c8d6e5; }
    .fc .fc-button { font-family: 'JetBrains Mono', Consolas, monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; background: #0d1220; border-color: #1a2332; color: #c8d6e5; }
    .fc .fc-button:hover { background: #111827; }
    .fc .fc-button-active, .fc .fc-button:active { background: #00e5ff !important; color: #0a0e17 !important; border-color: #00e5ff !important; }
    .fc .fc-col-header-cell-cushion { font-family: 'JetBrains Mono', Consolas, monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #4a5568; }
    .fc .fc-daygrid-day-number { color: #4a5568; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 0.75rem; }
    .fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number { background: #00e5ff20; color: #00e5ff; border-radius: 4px; }
    .fc .fc-event { border-radius: 4px; padding: 0 6px; font-size: 0.7rem; cursor: pointer; }
    .fc-theme-standard td, .fc-theme-standard th { border-color: #1a233240 !important; }
    .fc .fc-daygrid-day-frame { min-height: 80px; }

    @media print {
        .no-print, nav, header, .fixed { display: none !important; }
        body { background: white !important; color: #1a2332 !important; }
        .bg-panel { background: white !important; border-color: #ddd !important; }
        .fc .fc-toolbar-title { color: #0a0e17 !important; }
        .fc .fc-button { display: none !important; }
        .fc-theme-standard td, .fc-theme-standard th { border-color: #ccc !important; }
        .fc .fc-event { border: 1px solid #333 !important; color: #000 !important; }
    }
</style>
{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4 no-print">
    <h2 class="text-lg font-bold mono tracking-wider text-text">CALENDAR</h2>
    <button @click="$window.print()"
            class="px-3 py-1.5 text-xs font-medium mono uppercase tracking-wider text-muted border border-border rounded hover:text-text transition-colors no-print">
        Export PDF
    </button>
</div>
<div class="bg-panel border border-border rounded-xl p-5">
    <div id="calendar"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,listWeek'
        },
        editable: false,
        selectable: false,
        events: '/api/calendar/events',
        eventClick: function(info) {
            if (info.event.url) {
                window.location.href = info.event.url;
            }
        },
        eventDisplay: 'block',
        height: 'auto',
    });
    calendar.render();
});
</script>
{% endblock %}
