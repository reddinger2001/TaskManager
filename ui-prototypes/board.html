<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskManager — Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0e17', surface: '#0d1220', panel: '#111827',
                        border: '#1a2332', accent: '#00e5ff', accent2: '#7c4dff',
                        dim: '#3a4a5c', text: '#c8d6e5', muted: '#4a5568',
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'Consolas', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        * { scrollbar-width: thin; scrollbar-color: #1a2332 transparent; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a2332; border-radius: 2px; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .mono { font-family: 'JetBrains Mono', Consolas, monospace; }

        .card-dragging { opacity: 0.4; transform: rotate(3deg) scale(0.97); }

        .column-bg {
            background: linear-gradient(180deg, #0d1220 0%, #0a0e17 100%);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7) sepia(1) saturate(3) hue-rotate(180deg);
        }
    </style>
</head>
<body class="bg-bg text-text min-h-screen" x-data="board()">

<!-- Header -->
<header class="border-b border-border sticky top-0 z-40 bg-bg/90 backdrop-blur-md">
    <div class="px-6">
        <div class="flex items-center justify-between h-[52px]">
            <div class="flex items-center gap-8">
                <h1 class="text-base font-bold tracking-widest mono text-accent">
                    <span style="opacity: 0.4;">&#9632;</span> TASKMANAGER
                </h1>
                <nav class="flex items-center gap-1">
                    <a href="dashboard.html" class="px-3 py-1.5 text-xs font-medium tracking-wider mono uppercase text-muted hover:text-text transition-colors">Dashboard</a>
                    <a href="#" class="px-3 py-1.5 text-xs font-medium tracking-wider mono uppercase text-accent border-b-2 border-accent">Board</a>
                    <a href="gantt.html" class="px-3 py-1.5 text-xs font-medium tracking-wider mono uppercase text-muted hover:text-text transition-colors">Gantt</a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <select x-model="filterProject" class="px-3 py-1.5 text-xs mono bg-surface border border-border rounded text-text focus:outline-none focus:border-accent/40">
                    <option value="">All Projects</option>
                    <template x-for="proj in projects" :key="proj.id">
                        <option :value="proj.id" x-text="proj.name"></option>
                    </template>
                </select>
                <select x-model="filterAssignee" class="px-3 py-1.5 text-xs mono bg-surface border border-border rounded text-text focus:outline-none focus:border-accent/40">
                    <option value="">All Assignees</option>
                    <template x-for="name in assignees" :key="name">
                        <option :value="name" x-text="name"></option>
                    </template>
                </select>
                <button @click="showModal = true" class="px-3 py-1.5 text-xs font-medium mono uppercase tracking-wider text-bg bg-accent rounded hover:bg-cyan-300 transition-colors">
                    + New
                </button>
            </div>
        </div>
    </div>
</header>

<!-- Board -->
<main class="p-4 overflow-x-auto">
    <div class="flex gap-3" style="min-width: 1100px; min-height: calc(100vh - 6rem);">

        <template x-for="status in statuses" :key="status.key">
            <div class="flex-shrink-0 w-72 flex flex-col rounded-xl overflow-hidden column-bg border border-border/60"
                 @dragover.prevent="dropTarget = status.key"
                 @dragleave="dropTarget = null"
                 @drop="onDrop($event, status.key)">

                <!-- Column Header -->
                <div class="flex items-center justify-between px-4 py-3 border-b border-border/60">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full" :style="`background: ${status.color}; box-shadow: 0 0 8px ${status.color}60;`"></span>
                        <h2 class="text-xs font-semibold mono uppercase tracking-widest" :style="`color: ${status.color}`;" x-text="status.label"></h2>
                    </div>
                    <span class="mono text-xs px-1.5 py-0.5 rounded bg-panel border border-border" x-text="filteredTasks(status.key).length"></span>
                </div>

                <!-- Cards -->
                <div class="flex-1 overflow-y-auto p-3 space-y-2">
                    <template x-for="task in filteredTasks(status.key)" :key="task.id">
                        <div class="bg-surface border border-border rounded-lg p-3 cursor-grab active:cursor-grabbing hover:border-accent/30 hover:shadow-lg hover:shadow-accent/5 transition-all"
                             draggable="true"
                             @dragstart="onDragStart($event, task)"
                             @dragend="onDragEnd($event)"
                             @click="selectedTask = task; showDetail = true">

                            <!-- Priority + Title -->
                            <div class="flex items-start justify-between gap-2">
                                <div class="flex items-center gap-1.5 min-w-0">
                                    <span x-show="task.priority" class="mono text-xs font-bold px-1.5 py-0.5 rounded shrink-0" :class="priorityClass(task.priority)" x-text="task.priority"></span>
                                    <h3 class="text-sm font-medium text-text truncate" x-text="task.title"></h3>
                                </div>
                            </div>

                            <!-- Description -->
                            <p x-show="task.description" class="text-xs text-muted mt-1.5 line-clamp-2 leading-relaxed" x-text="task.description"></p>

                            <!-- Footer -->
                            <div class="flex items-center justify-between mt-2.5">
                                <div class="flex items-center gap-2">
                                    <span x-show="task.assignee" class="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold mono border shrink-0" :style="`background: ${stringToColor(task.assignee)}15; color: ${stringToColor(task.assignee)}; border-color: ${stringToColor(task.assignee)}30;`" x-text="task.assignee.charAt(0)"></span>
                                    <span x-show="task.project" class="text-xs text-muted truncate max-w-[7rem]" x-text="task.project"></span>
                                </div>
                                <span x-show="task.due_date" class="text-xs mono" :class="isOverdue(task.due_date) ? 'text-red-400' : 'text-muted'" x-text="formatDate(task.due_date)"></span>
                            </div>

                            <!-- Tags -->
                            <div x-show="task.tags && task.tags.length > 0" class="flex flex-wrap gap-1 mt-2">
                                <template x-for="tag in task.tags" :key="tag">
                                    <span class="mono text-xs px-1.5 py-0.5 rounded bg-panel text-muted border border-border" x-text="'#' + tag"></span>
                                </template>
                            </div>
                        </div>
                    </template>

                    <div x-show="filteredTasks(status.key).length === 0" class="text-center py-8">
                        <span class="text-xs mono text-muted/50">— empty —</span>
                    </div>
                </div>
            </div>
        </template>

    </div>
</main>

<!-- Task Detail Modal -->
<div x-show="showDetail" x-cloak class="fixed inset-0 z-50 overflow-y-auto" @keydown.escape.window="showDetail = false">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-bg/70 backdrop-blur-sm" @click="showDetail = false"></div>

        <div class="relative bg-surface w-full max-w-md shadow-2xl border border-border rounded-xl">
            <button @click="showDetail = false" class="absolute top-4 right-4 text-muted hover:text-text z-10 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <template x-if="selectedTask">
                <div class="p-6">
                    <h2 class="text-base font-semibold text-text mb-4" x-text="selectedTask.title"></h2>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-xs mono uppercase tracking-wider text-muted mb-1">Status</label>
                            <span class="mono text-xs px-2.5 py-1 rounded-md" :class="statusClass(selectedTask.status)" x-text="selectedTask.status"></span>
                        </div>
                        <div>
                            <label class="block text-xs mono uppercase tracking-wider text-muted mb-1">Priority</label>
                            <span x-show="selectedTask.priority" class="mono text-xs font-bold px-2.5 py-1 rounded-md" :class="priorityClass(selectedTask.priority)" x-text="selectedTask.priority"></span>
                            <span x-show="!selectedTask.priority" class="text-sm text-muted">—</span>
                        </div>
                        <div>
                            <label class="block text-xs mono uppercase tracking-wider text-muted mb-1">Assignee</label>
                            <span class="text-sm text-text" x-text="selectedTask.assignee || '—'"></span>
                        </div>
                        <div>
                            <label class="block text-xs mono uppercase tracking-wider text-muted mb-1">Due Date</label>
                            <span class="text-sm text-text" x-text="selectedTask.due_date || '—'"></span>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs mono uppercase tracking-wider text-muted mb-1">Project</label>
                            <span class="text-sm text-text" x-text="selectedTask.project || '—'"></span>
                        </div>
                    </div>

                    <div x-show="selectedTask.description">
                        <label class="block text-xs mono uppercase tracking-wider text-muted mb-1">Description</label>
                        <p class="text-sm text-muted leading-relaxed" x-text="selectedTask.description"></p>
                    </div>

                    <div x-show="selectedTask.tags && selectedTask.tags.length > 0" class="mt-4">
                        <label class="block text-xs mono uppercase tracking-wider text-muted mb-1">Tags</label>
                        <div class="flex flex-wrap gap-1.5">
                            <template x-for="tag in selectedTask.tags" :key="tag">
                                <span class="mono text-xs px-2 py-0.5 rounded bg-panel text-muted border border-border" x-text="'#' + tag"></span>
                            </template>
                        </div>
                    </div>

                    <div class="mt-6 pt-4 border-t border-border flex gap-2">
                        <button class="flex-1 px-3 py-2 text-xs mono uppercase tracking-wider text-muted bg-panel rounded-lg hover:text-text transition-colors">Edit</button>
                        <button class="px-3 py-2 text-xs mono uppercase tracking-wider text-red-400 bg-panel rounded-lg hover:bg-red-500/10 transition-colors">Delete</button>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<!-- New Task Modal -->
<div x-show="showModal" x-cloak class="fixed inset-0 z-50 overflow-y-auto" @keydown.escape.window="showModal = false">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-bg/80 backdrop-blur-sm" @click="showModal = false"></div>
        <div class="relative bg-surface rounded-xl border border-border w-full max-w-lg">
            <div class="flex items-center justify-between px-6 py-4 border-b border-border">
                <h2 class="text-sm font-bold mono uppercase tracking-widest text-accent">New</h2>
                <button @click="showModal = false" class="text-muted hover:text-text transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form @submit.prevent="showModal = false" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs mono uppercase tracking-wider text-muted mb-1.5">Title <span class="text-red-400">*</span></label>
                    <input type="text" required placeholder="What's on your mind?" class="w-full px-3 py-2.5 text-sm bg-bg border border-border rounded-lg text-text placeholder-muted focus:outline-none focus:border-accent/40 transition-colors">
                </div>
                <div>
                    <label class="block text-xs mono uppercase tracking-wider text-muted mb-1.5">Description</label>
                    <textarea rows="3" placeholder="Optional details..." class="w-full px-3 py-2.5 text-sm bg-bg border border-border rounded-lg text-text placeholder-muted focus:outline-none focus:border-accent/40 transition-colors resize-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs mono uppercase tracking-wider text-muted mb-1.5">Status</label>
                        <select class="w-full px-3 py-2.5 text-sm bg-bg border border-border rounded-lg text-text focus:outline-none focus:border-accent/40 transition-colors">
                            <option value="backlog">Backlog</option>
                            <option value="active">Active</option>
                            <option value="delegated">Delegated</option>
                            <option value="blocked">Blocked</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs mono uppercase tracking-wider text-muted mb-1.5">Priority</label>
                        <select class="w-full px-3 py-2.5 text-sm bg-bg border border-border rounded-lg text-text focus:outline-none focus:border-accent/40 transition-colors">
                            <option value="">— None —</option>
                            <option value="P0">P0 — Critical</option>
                            <option value="P1">P1 — High</option>
                            <option value="P2">P2 — Normal</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs mono uppercase tracking-wider text-muted mb-1.5">Due Date</label>
                        <input type="date" class="w-full px-3 py-2.5 text-sm bg-bg border border-border rounded-lg text-text focus:outline-none focus:border-accent/40 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs mono uppercase tracking-wider text-muted mb-1.5">Assignee</label>
                        <input type="text" placeholder="Name..." class="w-full px-3 py-2.5 text-sm bg-bg border border-border rounded-lg text-text placeholder-muted focus:outline-none focus:border-accent/40 transition-colors">
                    </div>
                </div>
                <div>
                    <label class="block text-xs mono uppercase tracking-wider text-muted mb-1.5">Project</label>
                    <select class="w-full px-3 py-2.5 text-sm bg-bg border border-border rounded-lg text-text focus:outline-none focus:border-accent/40 transition-colors">
                        <option value="">— None — (Inbox)</option>
                        <template x-for="proj in projects" :key="proj.id">
                            <option :value="proj.id" x-text="proj.name"></option>
                        </template>
                    </select>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-border">
                    <button type="button" @click="showModal = false" class="px-4 py-2.5 text-xs mono uppercase tracking-wider text-muted bg-panel rounded-lg hover:text-text transition-colors">Cancel</button>
                    <button type="submit" class="px-4 py-2.5 text-xs mono uppercase tracking-wider text-bg bg-accent rounded-lg hover:bg-cyan-300 transition-colors">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function board() {
    return {
        showModal: false, showDetail: false, selectedTask: null,
        filterProject: '', filterAssignee: '', draggedTask: null, dropTarget: null,

        projects: [
            { id: 1, name: 'SOC Modernization' },
            { id: 2, name: 'Q3 Audit Prep' },
            { id: 3, name: 'Vendor Assessments' },
        ],

        statuses: [
            { key: 'backlog',   label: 'Backlog',   color: '#6b7280' },
            { key: 'active',    label: 'Active',     color: '#00e5ff' },
            { key: 'delegated', label: 'Delegated',  color: '#7c4dff' },
            { key: 'blocked',   label: 'Blocked',    color: '#ff5252' },
            { key: 'done',      label: 'Done',       color: '#69f0ae' },
        ],

        tasks: [
            { id: 1, title: 'Tabletop exercise — ransomware scenario', description: 'Plan and execute a tabletop exercise simulating a ransomware attack.', priority: 'P1', status: 'backlog', assignee: '', project: 'SOC Modernization', due_date: '2026-08-15', tags: ['exercise', 'planning'] },
            { id: 2, title: 'Update incident response contact list', priority: 'P2', status: 'backlog', assignee: '', project: 'SOC Modernization' },
            { id: 3, title: 'NIST CSF mapping for new regulation', priority: 'P1', status: 'backlog', assignee: '', project: 'Q3 Audit Prep', due_date: '2026-08-01' },
            { id: 4, title: 'Review firewall rules for DMZ segment', priority: 'P2', status: 'backlog', assignee: '' },
            { id: 5, title: 'SOC runbook update — phishing response', description: 'Update the phishing incident response runbook with new procedures for BEC.', priority: 'P1', status: 'active', assignee: '', project: 'SOC Modernization', due_date: '2026-07-18', tags: ['runbook'] },
            { id: 6, title: 'Security training Q3 planning', priority: 'P2', status: 'active', assignee: '', due_date: '2026-08-01' },
            { id: 7, title: 'Phishing simulation vendor evaluation', priority: 'P1', status: 'active', assignee: 'Mike', project: 'Vendor Assessments', due_date: '2026-07-25', tags: ['vendor'] },
            { id: 8, title: 'Policy review — Acceptable Use Policy', priority: 'P1', status: 'delegated', assignee: 'Sarah', project: 'SOC Modernization' },
            { id: 9, title: 'Incident response documentation update', priority: 'P1', status: 'delegated', assignee: 'Jamie', project: 'SOC Modernization' },
            { id: 10, title: 'MFA rollout plan for Q4', priority: 'P2', status: 'delegated', assignee: 'Alex', project: 'SOC Modernization' },
            { id: 11, title: 'Vendor assessment — Acme Corp', description: 'Waiting on vendor to provide SOC 2 report.', priority: '', status: 'blocked', assignee: 'Sarah', project: 'Vendor Assessments', tags: ['vendor'] },
            { id: 12, title: 'Access control review — Finance dept', description: 'Blocked — waiting on HR for employee list.', priority: '', status: 'blocked', assignee: 'Mike' },
            { id: 13, title: 'Complete Q2 security awareness training', priority: 'P1', status: 'done', assignee: '', project: 'SOC Modernization' },
            { id: 14, title: 'Patch critical vulnerabilities on web servers', priority: 'P0', status: 'done', assignee: '', project: 'SOC Modernization' },
        ],

        get assignees() {
            return [...new Set(this.tasks.map(t => t.assignee).filter(Boolean))];
        },

        filteredTasks(status) {
            let tasks = this.tasks.filter(t => t.status === status);
            if (this.filterProject) {
                const proj = this.projects.find(p => p.id == this.filterProject);
                if (proj) tasks = tasks.filter(t => t.project === proj.name);
            }
            if (this.filterAssignee) tasks = tasks.filter(t => t.assignee === this.filterAssignee);
            return tasks;
        },

        onDragStart(event, task) {
            this.draggedTask = task;
            event.target.classList.add('card-dragging');
            event.dataTransfer.effectAllowed = 'move';
        },
        onDragEnd(event) {
            event.target.classList.remove('card-dragging');
            this.draggedTask = null;
        },
        onDrop(event, statusKey) {
            event.preventDefault();
            if (this.draggedTask && this.draggedTask.status !== statusKey) {
                console.log(`"${this.draggedTask.title}" → ${statusKey}`);
                this.draggedTask.status = statusKey;
            }
            this.dropTarget = null;
        },

        priorityClass(p) {
            if (p === 'P0') return 'bg-red-500/20 text-red-400 border border-red-500/30';
            if (p === 'P1') return 'bg-amber-500/20 text-amber-400 border border-amber-500/30';
            if (p === 'P2') return 'bg-cyan-500/20 text-accent border border-cyan-500/30';
            return '';
        },
        statusClass(s) {
            const m = {
                backlog: 'text-muted bg-panel',
                active: 'text-accent bg-accent/10 border border-accent/20',
                blocked: 'text-red-400 bg-red-500/10 border border-red-500/20',
                delegated: 'text-accent2 bg-accent2/10 border border-accent2/20',
                done: 'text-green-400 bg-green-500/10 border border-green-500/20',
            };
            return m[s] || '';
        },
        formatDate(d) {
            return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        },
        isOverdue(d) {
            if (!d) return false;
            const today = new Date(); today.setHours(0,0,0,0);
            return new Date(d) < today;
        },
        stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            const colors = ['#00e5ff', '#7c4dff', '#ff5252', '#ffc107', '#69f0ae', '#ff6e40'];
            return colors[Math.abs(hash) % colors.length];
        }
    }
}
</script>

</body>
</html>
