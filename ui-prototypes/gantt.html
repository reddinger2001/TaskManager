<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskManager — Gantt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0e17', surface: '#0d1220', panel: '#111827',
                        border: '#1a2332', accent: '#00e5ff', accent2: '#7c4dff',
                        dim: '#3a4a5c', text: '#c8d6e5', muted: '#4a5568',
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'Consolas', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        * { scrollbar-width: thin; scrollbar-color: #1a2332 transparent; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a2332; border-radius: 2px; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .mono { font-family: 'JetBrains Mono', Consolas, monospace; }

        .bar-active    { background: linear-gradient(90deg, #00e5ff30, #00e5ff60); border-left: 2px solid #00e5ff; }
        .bar-done      { background: linear-gradient(90deg, #69f0ae30, #69f0ae60); border-left: 2px solid #69f0ae; }
        .bar-blocked   { background: linear-gradient(90deg, #ff525230, #ff525260); border-left: 2px solid #ff5252; }
        .bar-delegated { background: linear-gradient(90deg, #7c4dff30, #7c4dff60); border-left: 2px solid #7c4dff; }
        .bar-backlog   { background: linear-gradient(90deg, #6b728020, #6b728040); border-left: 2px solid #6b7280; }

        .grid-line { border-right: 1px solid #1a233240; }
        .today-line { border-right: 2px solid #00e5ff40; }
    </style>
</head>
<body class="bg-bg text-text min-h-screen" x-data="gantt()">

<!-- Header -->
<header class="border-b border-border sticky top-0 z-40 bg-bg/90 backdrop-blur-md">
    <div class="px-6">
        <div class="flex items-center justify-between h-[52px]">
            <div class="flex items-center gap-8">
                <h1 class="text-base font-bold tracking-widest mono text-accent">
                    <span style="opacity: 0.4;">&#9632;</span> TASKMANAGER
                </h1>
                <nav class="flex items-center gap-1">
                    <a href="dashboard.html" class="px-3 py-1.5 text-xs font-medium tracking-wider mono uppercase text-muted hover:text-text transition-colors">Dashboard</a>
                    <a href="board.html" class="px-3 py-1.5 text-xs font-medium tracking-wider mono uppercase text-muted hover:text-text transition-colors">Board</a>
                    <a href="#" class="px-3 py-1.5 text-xs font-medium tracking-wider mono uppercase text-accent border-b-2 border-accent">Gantt</a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <select x-model="filterProject" class="px-3 py-1.5 text-xs mono bg-surface border border-border rounded text-text focus:outline-none focus:border-accent/40">
                    <option value="">All Projects</option>
                    <template x-for="proj in projects" :key="proj.id">
                        <option :value="proj.name" x-text="proj.name"></option>
                    </template>
                </select>
                <button @click="exportChart()" class="px-3 py-1.5 text-xs font-medium mono uppercase tracking-wider text-muted bg-surface border border-border rounded hover:text-text transition-colors">
                    Export
                </button>
            </div>
        </div>
    </div>
</header>

<!-- Gantt Chart -->
<main class="px-6 py-6">

    <!-- Legend -->
    <div class="flex items-center gap-5 mb-4 text-xs mono text-muted">
        <span class="flex items-center gap-1.5"><span class="w-3 h-1 rounded-full" style="background: #00e5ff;"></span> Active</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-1 rounded-full" style="background: #7c4dff;"></span> Delegated</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-1 rounded-full" style="background: #ff5252;"></span> Blocked</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-1 rounded-full" style="background: #69f0ae;"></span> Done</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-1 rounded-full" style="background: #6b7280;"></span> Backlog</span>
    </div>

    <!-- Chart -->
    <div class="bg-surface border border-border rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
            <div x-ref="ganttContainer" style="min-width: 900px;">

                <!-- Month Header Row -->
                <div class="flex border-b border-border/40 sticky top-0 bg-surface z-10">
                    <div class="w-56 flex-shrink-0 px-4 py-2 border-r border-border">
                        <span class="text-xs mono uppercase tracking-wider text-muted">Task</span>
                    </div>
                    <div class="flex flex-1">
                        <template x-for="month in monthGroups" :key="month.name">
                            <div class="flex-shrink-0 border-r border-border/40 bg-panel/30 flex items-center justify-center text-xs mono uppercase tracking-wider text-muted font-semibold"
                                 :style="`width: ${month.dayCount * dayWidth}px;`"
                                 x-text="month.name"></div>
                        </template>
                    </div>
                </div>

                <!-- Day Header Row -->
                <div class="flex border-b border-border sticky top-7 bg-surface z-10">
                    <div class="w-56 flex-shrink-0 px-4 py-1.5 border-r border-border"></div>
                    <div class="flex flex-1">
                        <template x-for="(day, i) in days" :key="i">
                            <div :class="`grid-line flex-shrink-0 flex items-center justify-center ${day.isToday ? 'today-line bg-accent/5' : ''} ${day.isWeekend ? 'bg-panel/20' : ''}`"
                                 :style="`width: ${dayWidth}px; height: 28px;`">
                                <span class="text-[10px] mono leading-none" :class="day.isToday ? 'text-accent font-bold' : 'text-muted'" x-text="day.dayNum"></span>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Task Rows -->
                <div>
                    <template x-for="(task, ti) in filteredTasks" :key="task.id">
                        <div class="flex border-b border-border/40 hover:bg-panel/50 transition-colors">
                            <!-- Task Label -->
                            <div class="w-56 flex-shrink-0 px-4 py-2.5 border-r border-border flex items-center gap-2">
                                <span x-show="task.priority" class="mono text-xs font-bold px-1 py-0.5 rounded shrink-0" :class="priorityClass(task.priority)" x-text="task.priority"></span>
                                <span class="text-sm text-text truncate" x-text="task.title"></span>
                            </div>

                            <!-- Timeline -->
                            <div class="flex-1 relative py-2">
                                <template x-for="(day, i) in days" :key="i">
                                    <div class="grid-line flex-shrink-0" :style="`width: ${dayWidth}px;`"></div>
                                </template>

                                <!-- Bar -->
                                <div class="absolute top-1/2 -translate-y-1/2 h-5 rounded-sm bar-active cursor-pointer hover:brightness-125 transition-all"
                                     :class="barClass(task.status)"
                                     :style="getBarStyle(task)"
                                     :title="`${task.title}\n${task.start} → ${task.end}\n${task.status}`">
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Details Table -->
    <div class="mt-6 bg-surface border border-border rounded-xl overflow-hidden">
        <div class="px-6 py-3 border-b border-border">
            <h2 class="text-xs font-semibold mono uppercase tracking-widest text-muted">Task Details</h2>
        </div>
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-border/40">
                    <th class="px-4 py-2.5 text-left font-medium mono text-xs uppercase tracking-wider text-muted">Title</th>
                    <th class="px-4 py-2.5 text-left font-medium mono text-xs uppercase tracking-wider text-muted">Project</th>
                    <th class="px-4 py-2.5 text-left font-medium mono text-xs uppercase tracking-wider text-muted">Status</th>
                    <th class="px-4 py-2.5 text-left font-medium mono text-xs uppercase tracking-wider text-muted">Priority</th>
                    <th class="px-4 py-2.5 text-left font-medium mono text-xs uppercase tracking-wider text-muted">Assignee</th>
                    <th class="px-4 py-2.5 text-left font-medium mono text-xs uppercase tracking-wider text-muted">Start</th>
                    <th class="px-4 py-2.5 text-left font-medium mono text-xs uppercase tracking-wider text-muted">End</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="task in filteredTasks" :key="task.id">
                    <tr class="border-b border-border/20 hover:bg-panel/50 transition-colors">
                        <td class="px-4 py-2.5 font-medium text-text" x-text="task.title"></td>
                        <td class="px-4 py-2.5 text-muted" x-text="task.project || '—'"></td>
                        <td class="px-4 py-2.5">
                            <span class="mono text-xs px-2 py-0.5 rounded" :class="statusClass(task.status)" x-text="task.status"></span>
                        </td>
                        <td class="px-4 py-2.5">
                            <span x-show="task.priority" class="mono text-xs font-bold px-1.5 py-0.5 rounded" :class="priorityClass(task.priority)" x-text="task.priority"></span>
                            <span x-show="!task.priority" class="text-muted">—</span>
                        </td>
                        <td class="px-4 py-2.5 text-muted" x-text="task.assignee || '—'"></td>
                        <td class="px-4 py-2.5 mono text-xs text-muted" x-text="task.start"></td>
                        <td class="px-4 py-2.5 mono text-xs text-muted" x-text="task.end"></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

</main>

<script>
function gantt() {
    return {
        filterProject: '',
        dayWidth: 38,
        projects: [
            { id: 1, name: 'SOC Modernization' },
            { id: 2, name: 'Q3 Audit Prep' },
            { id: 3, name: 'Vendor Assessments' },
        ],

        tasks: [
            { id: 1, title: 'Patch critical vulns', project: 'SOC Modernization', status: 'done', priority: 'P0', assignee: '', start: '2026-06-15', end: '2026-06-20' },
            { id: 2, title: 'Q2 security training', project: 'SOC Modernization', status: 'done', priority: 'P1', assignee: '', start: '2026-06-01', end: '2026-06-30' },
            { id: 3, title: 'Acme Corp assessment', project: 'Vendor Assessments', status: 'blocked', priority: '', assignee: 'Sarah', start: '2026-07-07', end: '2026-07-25' },
            { id: 4, title: 'SOC runbook update', project: 'SOC Modernization', status: 'active', priority: 'P1', assignee: '', start: '2026-07-10', end: '2026-07-18' },
            { id: 5, title: 'Q3 audit prep timeline', project: 'Q3 Audit Prep', status: 'backlog', priority: 'P0', assignee: '', start: '2026-07-10', end: '2026-07-20' },
            { id: 6, title: 'Policy review — AUP', project: 'SOC Modernization', status: 'delegated', priority: 'P1', assignee: 'Sarah', start: '2026-07-14', end: '2026-07-25' },
            { id: 7, title: 'IR documentation update', project: 'SOC Modernization', status: 'delegated', priority: 'P1', assignee: 'Jamie', start: '2026-07-14', end: '2026-08-01' },
            { id: 8, title: 'Phishing sim vendor eval', project: 'Vendor Assessments', status: 'active', priority: 'P1', assignee: 'Mike', start: '2026-07-14', end: '2026-07-25' },
            { id: 9, title: 'Update IR contact list', project: 'SOC Modernization', status: 'backlog', priority: 'P2', assignee: '', start: '2026-07-20', end: '2026-07-25' },
            { id: 10, title: 'NIST CSF mapping', project: 'Q3 Audit Prep', status: 'backlog', priority: 'P1', assignee: '', start: '2026-07-20', end: '2026-08-05' },
            { id: 11, title: 'MFA rollout plan', project: 'SOC Modernization', status: 'delegated', priority: 'P2', assignee: 'Alex', start: '2026-07-21', end: '2026-08-15' },
            { id: 12, title: 'Tabletop exercise', project: 'SOC Modernization', status: 'backlog', priority: 'P1', assignee: '', start: '2026-08-11', end: '2026-08-15' },
            { id: 13, title: 'Draft Q4 budget numbers', project: 'Vendor Assessments', status: 'backlog', priority: '', assignee: '', start: '2026-08-01', end: '2026-08-15' },
        ],

        get filteredTasks() {
            if (!this.filterProject) return this.tasks;
            return this.tasks.filter(t => t.project === this.filterProject);
        },

        get days() {
            const tasks = this.filteredTasks;
            if (tasks.length === 0) return [];

            // Find date range from tasks, with padding
            const allDates = tasks.flatMap(t => [new Date(t.start), new Date(t.end)]);
            let minDate = new Date(Math.min(...allDates));
            let maxDate = new Date(Math.max(...allDates));

            // Add 3 days padding on each side
            minDate.setDate(minDate.getDate() - 3);
            maxDate.setDate(maxDate.getDate() + 3);

            // Round to Monday
            const dayOfWeek = minDate.getDay();
            if (dayOfWeek !== 1) {
                const diff = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
                minDate.setDate(minDate.getDate() + diff);
            }

            const days = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            for (let d = new Date(minDate); d <= maxDate; d.setDate(d.getDate() + 1)) {
                const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                const isToday = d.getTime() === today.getTime();
                days.push({
                    date: new Date(d),
                    dayNum: d.getDate(),
                    monthKey: `${d.getFullYear()}-${d.getMonth()}`,
                    isWeekend,
                    isToday,
                });
            }
            return days;
        },

        get monthGroups() {
            const days = this.days;
            if (days.length === 0) return [];
            const groups = {};
            for (const day of days) {
                if (!groups[day.monthKey]) groups[day.monthKey] = { name: '', dayCount: 0 };
                groups[day.monthKey].dayCount++;
            }
            const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return Object.entries(groups).map(([key, group]) => {
                const [year, month] = key.split('-');
                return { name: `${monthNames[parseInt(month)]} ${year.slice(2)}`, dayCount: group.dayCount };
            });
        },

        getBarStyle(task) {
            const start = new Date(task.start);
            const end = new Date(task.end);
            const firstDay = this.days[0]?.date;
            if (!firstDay) return '';

            const startOffset = Math.max(0, (start - firstDay) / (1000 * 60 * 60 * 24));
            const duration = Math.max(1, ((end - start) / (1000 * 60 * 60 * 24)) + 1);

            return `left: ${startOffset * this.dayWidth}px; width: ${duration * this.dayWidth}px;`;
        },

        barClass(status) {
            const map = {
                active: 'bar-active',
                done: 'bar-done',
                blocked: 'bar-blocked',
                delegated: 'bar-delegated',
                backlog: 'bar-backlog',
            };
            return map[status] || 'bar-backlog';
        },

        priorityClass(p) {
            if (p === 'P0') return 'bg-red-500/20 text-red-400 border border-red-500/30';
            if (p === 'P1') return 'bg-amber-500/20 text-amber-400 border border-amber-500/30';
            if (p === 'P2') return 'bg-cyan-500/20 text-accent border border-cyan-500/30';
            return '';
        },

        statusClass(s) {
            const m = {
                backlog: 'text-muted bg-panel',
                active: 'text-accent bg-accent/10 border border-accent/20',
                blocked: 'text-red-400 bg-red-500/10 border border-red-500/20',
                delegated: 'text-accent2 bg-accent2/10 border border-accent2/20',
                done: 'text-green-400 bg-green-500/10 border border-green-500/20',
            };
            return m[s] || '';
        },

        exportChart() {
            const el = this.$refs.ganttContainer;
            if (!el) return;
            const win = window.open('', '_blank');
            win.document.write(`<!DOCTYPE html><html><head>
                <title>Project Timeline</title>
                <style>body{margin:2rem;font-family:system-ui;background:#0a0e17;color:#c8d6e5;}h1{font-size:1.5rem;margin-bottom:.5rem;}.meta{color:#4a5568;font-size:.875rem;margin-bottom:2rem;}</style>
            </head><body>
                <h1>Project Timeline</h1>
                <p class="meta">Generated ${new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}</p>
                ${el.outerHTML}
            </body></html>`);
        }
    }
}
</script>

</body>
</html>
